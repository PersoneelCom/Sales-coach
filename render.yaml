services:
  - type: web
    name: sales-coach
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TRANSCRIPTION_MODEL
        value: gpt-4o-transcribe-diarize
      - key: OPENAI_SUMMARY_MODEL
        value: gpt-4o-mini
      - key: AUTH_REQUIRED
        value: "true"
      - key: APP_PASSWORD_HASH
        sync: false
      - key: MAX_UPLOAD_MB
        value: "50"
      - key: MAX_AUDIO_MINUTES
        value: "30"
      - key: PROCESS_COOLDOWN_SECONDS
        value: "60"
      - key: ALLOW_GOOGLE_EXPORT
        value: "true"
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_DOC_SHARE_EMAIL
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
